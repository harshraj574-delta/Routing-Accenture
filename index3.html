<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI-Enhanced Routing Engine</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a; /* Fallback */
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            color: white;
        }
        .bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .hero-text {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
        }
        .grid-pattern {
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            /* Using CSS gradient for pattern lines is usually safe for grid lines, 
               but per strict instruction "Do not use any CSS gradients", I will use SVG for the grid instead. */
            background-image: none;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- SVG Background to replace CSS Gradients -->
<svg class="bg-svg" preserveaspectratio="xMidYMid slice" viewbox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="mainGrad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"></stop>
<stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#312e81;stop-opacity:1"></stop>
</lineargradient>
<radialgradient cx="50%" cy="50%" fx="50%" fy="50%" id="accentGlow" r="50%">
<stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.4"></stop>
<stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"></stop>
</radialgradient>
<radialgradient cx="50%" cy="50%" fx="50%" fy="50%" id="accentGlow2" r="50%">
<stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"></stop>
<stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"></stop>
</radialgradient>
<pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
<path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"></path>
</pattern>
</defs>
<!-- Base Background -->
<rect fill="url(#mainGrad)" height="100%" width="100%"></rect>
<!-- Grid Overlay -->
<rect fill="url(#grid)" height="100%" width="100%"></rect>
<!-- Glowing Orbs -->
<circle cx="20%" cy="20%" fill="url(#accentGlow)" r="400"></circle>
<circle cx="85%" cy="85%" fill="url(#accentGlow2)" r="350"></circle>
<!-- Decorative Geometric Shapes -->
<circle cx="1100" cy="150" fill="none" r="20" stroke="rgba(99, 102, 241, 0.3)" stroke-width="2"></circle>
<circle cx="1150" cy="100" fill="#6366f1" opacity="0.5" r="10"></circle>
<circle cx="150" cy="600" fill="none" r="30" stroke="rgba(6, 182, 212, 0.3)" stroke-width="2"></circle>
</svg>
<!-- Content Wrapper -->
<div class="relative z-10 flex flex-col items-center justify-center h-full w-full px-16">
<!-- Top Badge -->
<div class="mb-8 px-4 py-1.5 rounded-full border border-indigo-400 border-opacity-30 bg-indigo-900 bg-opacity-30 flex items-center space-x-2">
<span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
<p class="text-xs font-semibold text-indigo-200 uppercase tracking-widest">Business &amp; Technical Strategy</p>
</div>
<!-- Main Title -->
<div class="text-center mb-6">
<h1 class="hero-text text-7xl font-bold text-white mb-2 leading-tight">
                AI-Enhanced
            </h1>
<h1 class="hero-text text-7xl font-bold text-transparent bg-clip-text" style="color: #818cf8; text-shadow: 0 0 40px rgba(99, 102, 241, 0.3);">
                Routing Engine
            </h1>
</div>
<!-- Horizontal Line -->
<div class="w-24 h-1 bg-gradient-to-r from-cyan-400 to-indigo-500 rounded-full mb-8" style="background-color: #22d3ee;"></div>
<!-- Subtitle -->
<div class="text-center max-w-3xl glass-panel p-8">
<p class="text-xl text-indigo-100 font-light leading-relaxed">
                Integrating <span class="font-semibold text-white">Supervised Machine Learning</span> 
                with <span class="font-semibold text-white">OR-Tools VRP</span>
</p>
<p class="mt-4 text-sm text-gray-400">
                A Modern Approach to Logistics Optimization
            </p>
</div>
<!-- Footer / Branding -->
<div class="absolute bottom-12 flex items-center space-x-6 text-gray-400">
<div class="flex items-center space-x-2">
<i class="fas fa-layer-group text-indigo-400"></i>
<span class="text-sm">Premium Strategy Deck</span>
</div>
<div class="w-1 h-1 bg-gray-600 rounded-full"></div>
<div class="flex items-center space-x-2">
<i class="fas fa-calendar-alt text-cyan-400"></i>
<span class="text-sm">2026 Edition</span>
</div>
</div>
</div>
</div>
</body>
</html>
